name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Build and release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Build binaries
        run: |
          mkdir -p dist
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 \
            go build -trimpath -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o dist/agentsbuilder-linux-amd64 ./cmd/agentsbuilder
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 \
            go build -trimpath -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o dist/agentsbuilder-linux-arm64 ./cmd/agentsbuilder

      - name: Create checksums
        working-directory: dist
        run: sha256sum agentsbuilder-linux-* > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/agentsbuilder-linux-amd64
            dist/agentsbuilder-linux-arm64
            dist/checksums.txt
